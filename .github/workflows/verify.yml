name: verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: npm ci
      - run: npm run verify
