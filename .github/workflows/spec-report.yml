name: spec-report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: go install github.com/corca-ai/specdown/cmd/specdown@latest
      - run: npm ci
      - run: npm run specdown:pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
