name: release-artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: go install github.com/corca-ai/specdown/cmd/specdown@latest
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: npm ci
      - run: npm run verify
      - name: Build release artifacts
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          node ./scripts/release/fetch-github-archive-sha256.mjs --version "$VERSION" --output "dist/cautilus-${VERSION}.sha256"
          SHA256="$(tr -d '\n' < "dist/cautilus-${VERSION}.sha256")"
          node ./scripts/release/render-homebrew-formula.mjs --version "$VERSION" --sha256 "$SHA256" --output dist/Cautilus.rb
          while read -r GOOS GOARCH ASSET_OS ASSET_ARCH; do
            ASSET_NAME="cautilus_${VERSION#v}_${ASSET_OS}_${ASSET_ARCH}.tar.gz"
            STAGE_DIR="dist/stage/${ASSET_OS}_${ASSET_ARCH}"
            mkdir -p "$STAGE_DIR"
            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
              go build -ldflags="-X github.com/corca-ai/cautilus/internal/cli.buildVersion=${VERSION}" -o "$STAGE_DIR/cautilus" ./cmd/cautilus
            tar -czf "dist/${ASSET_NAME}" -C "$STAGE_DIR" cautilus
            rm -rf "$STAGE_DIR"
          done <<'EOF'
          darwin amd64 darwin x64
          darwin arm64 darwin arm64
          linux amd64 linux x64
          linux arm64 linux arm64
          EOF
          sha256sum dist/cautilus_*.tar.gz > "dist/cautilus-${VERSION}-checksums.txt"
          {
            echo "# Cautilus ${VERSION}"
            echo
            echo "- source archive checksum: \`${SHA256}\`"
            echo "- binary artifacts:"
            ls dist/cautilus_*.tar.gz | sed 's#dist/##' | sed 's#^#  - `#' | sed 's#$#`#'
            echo "- binary checksum manifest: \`cautilus-${VERSION}-checksums.txt\`"
            echo "- formula artifact: \`Cautilus.rb\`"
          } > "dist/release-notes-${VERSION}.md"
      - name: Attest binary release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: dist/cautilus-${{ github.ref_name }}-checksums.txt
      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap publication."
            exit 0
          fi
          TAP_REPO="$(node -e 'import("./scripts/release/resolve-release-targets.mjs").then((mod) => process.stdout.write(mod.resolveReleaseTargets().tapRepo))')"
          node ./scripts/release/publish-homebrew-formula.mjs \
            --tap-repo "$TAP_REPO" \
            --formula-file dist/Cautilus.rb \
            --version "${GITHUB_REF_NAME}"
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.sha256
            dist/cautilus_*.tar.gz
            dist/cautilus-*-checksums.txt
            dist/Cautilus.rb
            dist/release-notes-*.md
  verify-public-release:
    needs: release-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify published public release surface
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node ./scripts/release/verify-public-release.mjs \
            --version "${GITHUB_REF_NAME}" \
            --retry-attempts 10 \
            --retry-delay-ms 30000
