[extend]
useDefault = true

[[allowlists]]
description = "Allow Cautilus claim packet git commit metadata"
paths = ['''^\.cautilus/claims/.*\.json$''']
regexTarget = "line"
regexes = ['''"gitCommit"\s*:\s*"[0-9a-f]{40}"''']
condition = "AND"

[[allowlists]]
description = "Allow git commit metadata in checked-in claim packet evidence artifacts"
paths = ['''^charness-artifacts/.*\.json$''']
regexTarget = "line"
regexes = ['''"gitCommit"\s*:\s*"[0-9a-f]{40}"''']
condition = "AND"

[[allowlists]]
description = "Allow quoted claim packet commit metadata in debug records"
paths = ['''^charness-artifacts/debug/.*\.md$''']
regexTarget = "line"
regexes = ['''"gitCommit"\s*:\s*"[0-9a-f]{40}''']
condition = "AND"
