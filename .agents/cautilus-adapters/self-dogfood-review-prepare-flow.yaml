version: 1
repo: cautilus
evaluation_surfaces:
  - local bundled cautilus skill can prepare claim review input after first scan without overrun
required_prerequisites:
  - materialize the local cautilus skill surface before running the episode fixture
preflight_commands:
  - ./bin/cautilus install --repo-root . --overwrite
  - ./bin/cautilus doctor --repo-root . --scope agent-surface
evaluation_input_default: fixtures/eval/dev/skill/cautilus-review-prepare-flow.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-skill-refresh-flow-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --sandbox workspace-write --timeout-ms 300000 --claim-state absent --artifact-subdir review-prepare-flow --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-config project_doc_max_bytes=0 --codex-config include_apps_instructions=false --codex-config include_environment_context=false --claude-permission-mode dontAsk --claude-allowed-tools 'Bash(*)'
artifact_paths:
  - skills/cautilus/SKILL.md
  - fixtures/eval/dev/skill/cautilus-review-prepare-flow.fixture.json
  - scripts/run-self-dogfood-skill-refresh-flow-eval.mjs
  - scripts/agent-runtime/run-local-skill-test.mjs
  - scripts/agent-runtime/audit-cautilus-review-prepare-flow-log.mjs
comparison_questions:
  - Can the bundled cautilus skill complete first scan and then prepare deterministic claim review input without launching reviewers, applying results, planning evals, editing, or committing?
human_review_prompts:
  - id: review-prepare-flow-episode
    prompt: Where would an operator still conclude that the review-prepare episode hides the review budget or overruns past deterministic packet preparation?
