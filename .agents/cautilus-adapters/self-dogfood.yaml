version: 1
repo: cautilus
evaluation_surfaces:
  - explicit self-dogfood review of whether Cautilus records and surfaces its own quality path honestly
baseline_options:
  - baseline git ref in the same repo via {baseline_ref}
required_prerequisites:
  - refresh the current full-gate report before running review variants
review_timeout_ms: 30000
executor_variants:
  - id: codex-review
    tool: codex_exec
    purpose: bounded structured review of the latest self-dogfood report
    command_template: CAUTILUS_REVIEW_CODEX_MODEL=gpt-5.4-mini CAUTILUS_REVIEW_CODEX_REASONING_EFFORT=low bash scripts/agent-runtime/run-review-variant.sh --backend codex_exec --workspace {candidate_repo} --prompt-file {prompt_file} --schema-file {schema_file} --output-file {output_file}
    required_prerequisites:
      - generate the latest full-gate report before review variants
      - keep the candidate workspace on the exact checkout under evaluation
    safety_notes:
      - prefer the checked-in review verdict schema over free-form output
      - keep the review loop bounded to the generated self-dogfood prompt and report packet
artifact_paths:
  - README.md
  - docs/workflow.md
  - docs/specs/self-dogfood.spec.md
  - scripts/run-self-dogfood.mjs
  - skills/cautilus/SKILL.md
  - plugins/cautilus/skills/cautilus/SKILL.md
comparison_questions:
  - Does the current full-gate report support the narrower claim that Cautilus records and surfaces its own self-dogfood result honestly for operators?
  - Treat stronger standalone-binary or bundled-skill coverage claims as experiment surfaces unless the current report packet proves them directly.
  - Judge from the current report file and the listed product artifacts, not from stale files under artifacts/self-dogfood/latest while the new review is still running.
human_review_prompts:
  - id: operator-honesty
    prompt: Where would an operator still conclude the latest self-dogfood bundle overstates what the current evidence actually proves?
  - id: stale-latest
    prompt: Ignore artifacts/self-dogfood/latest from previous completed runs. Only judge the current report packet and the listed product files for this run.
default_schema_file: fixtures/review/review-verdict.schema.json
