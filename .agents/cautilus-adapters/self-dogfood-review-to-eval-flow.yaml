version: 1
repo: cautilus
evaluation_surfaces:
  - local bundled cautilus skill can carry a bounded claim review result into validation and eval planning
required_prerequisites:
  - materialize the local cautilus skill surface before running the episode fixture
preflight_commands:
  - ./bin/cautilus install --repo-root . --overwrite
  - ./bin/cautilus doctor --repo-root . --scope agent-surface
evaluation_input_default: fixtures/eval/dev/skill/cautilus-review-to-eval-flow.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-skill-refresh-flow-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --sandbox danger-full-access --timeout-ms 420000 --claim-state absent --artifact-subdir review-to-eval-flow --reviewer-smoke-backend claude_code --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-config project_doc_max_bytes=0 --codex-config include_apps_instructions=false --codex-config include_environment_context=false --claude-permission-mode dontAsk --claude-allowed-tools 'Bash(*),Write'
artifact_paths:
  - skills/cautilus/SKILL.md
  - fixtures/eval/dev/skill/cautilus-review-to-eval-flow.fixture.json
  - scripts/run-self-dogfood-skill-refresh-flow-eval.mjs
  - scripts/agent-runtime/run-local-skill-test.mjs
  - scripts/agent-runtime/run-claim-reviewer-smoke.mjs
  - scripts/agent-runtime/audit-cautilus-review-to-eval-flow-log.mjs
comparison_questions:
  - Can the bundled cautilus skill complete first scan, prepare deterministic review input, launch one actual reviewer lane, apply the result, validate the reviewed packet, plan evals, and stop before fixture authoring under both Codex and Claude CLI runtimes?
human_review_prompts:
  - id: review-to-eval-flow-episode
    prompt: Where would an operator still conclude that review-result application, validation, eval planning, or the stop boundary was skipped or faked?
