version: 1
repo: cautilus
evaluation_surfaces:
  - dev / repo evaluation of the reasoning-soundness judge tier on the REAL dogfood surface
baseline_options:
  - the pinned find-skills startup routing contract in AGENTS.md
required_prerequisites:
  - keep the checked-in real-surface capture, reasoning-soundness calibration, and captured blind-judge verdicts in sync
evaluation_input_default: fixtures/eval/dev/repo/realsurface-judge-eval-cases.json
default_runtime: fixture
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --fixture-results-file fixtures/eval/dev/repo/realsurface-judge-eval-fixture-results.json --reasoning-calibration fixtures/eval/dev/repo/reasoning-soundness-calibration.dev-repo-realsurface-routing.json --reasoning-verdicts fixtures/eval/dev/repo/reasoning-soundness-judge-verdicts.dev-repo-realsurface-routing.json --reasoning-provenance full-runner-capture-replay --sandbox read-only --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-home-mode isolated --codex-auth-mode inherit --claude-permission-mode dontAsk
artifact_paths:
  - AGENTS.md
  - fixtures/eval/dev/repo/realsurface-judge-eval-cases.json
  - fixtures/eval/dev/repo/realsurface-judge-eval-fixture-results.json
  - fixtures/eval/dev/repo/internal-runner-fixture-results.json
  - fixtures/eval/dev/repo/reasoning-soundness-calibration.dev-repo-realsurface-routing.json
  - fixtures/eval/dev/repo/reasoning-soundness-judge-verdicts.dev-repo-realsurface-routing.json
  - scripts/run-self-dogfood-eval.mjs
  - scripts/agent-runtime/enrich-eval-with-reasoning-judge.mjs
  - scripts/agent-runtime/reasoning-soundness-attach.mjs
comparison_questions:
  - Does the eval grade the dogfood runner's GENUINE captured AGENTS.md reasoning, not a synthetic paraphrase?
  - Does a case pass only when the deterministic surface matchers AND the reasoning-soundness judge both hold?
  - Does the judge tier catch the right-route-wrong-reason control the deterministic matchers pass?
human_review_prompts:
  - id: full-runner-provenance
    prompt: Where would an operator conclude the graded reasoning was NOT the dogfood runner's real capture (full-runner provenance), i.e. that the judge is still scoring a synthetic island?
  - id: judge-load-bearing
    prompt: Where would an operator conclude the judge tier was NOT actually load-bearing on the real surface — i.e. that an always-sound judge would still pass the realsurface-reason-control?
