version: 1
repo: cautilus
evaluation_surfaces:
  - local bundled cautilus skill routes repo-proof questions into first claim discovery
required_prerequisites:
  - materialize the local cautilus skill surface before running the episode fixture
preflight_commands:
  - ./bin/cautilus install --repo-root . --overwrite
  - ./bin/cautilus doctor --repo-root . --scope agent-surface
evaluation_input_default: fixtures/eval/dev/skill/cautilus-claim-discovery-routing-flow.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-skill-refresh-flow-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --sandbox workspace-write --timeout-ms 240000 --claim-state absent --artifact-subdir claim-discovery-routing-flow --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-config project_doc_max_bytes=0 --codex-config include_apps_instructions=false --codex-config include_environment_context=false --claude-permission-mode dontAsk --claude-allowed-tools 'Bash(*)'
artifact_paths:
  - skills/cautilus/SKILL.md
  - fixtures/eval/dev/skill/cautilus-claim-discovery-routing-flow.fixture.json
  - scripts/run-self-dogfood-skill-refresh-flow-eval.mjs
  - scripts/agent-runtime/run-local-skill-test.mjs
  - scripts/agent-runtime/audit-cautilus-first-scan-flow-log.mjs
comparison_questions:
  - Can the bundled cautilus skill route a repo-proof question into the first claim discovery workflow without overrun?
human_review_prompts:
  - id: claim-discovery-routing-flow-episode
    prompt: Where would an operator still conclude that a repo-proof question failed to enter the claim discovery path?
