version: 1
repo: cautilus
evaluation_surfaces:
  - app / prompt fixture-backed smoke for the product-facing evaluation surface
required_prerequisites:
  - use fixture runtime for command-routing proof; this is not model-quality evidence
default_runtime: fixture
evaluation_input_default: fixtures/eval/app/prompt/cautilus-tagline.fixture.json
eval_test_command_templates:
  - node ./scripts/agent-runtime/run-app-eval.mjs --workspace {candidate_repo} --cases-file {eval_cases_file} --output-file {eval_observed_file} --artifact-dir {output_dir}/app-eval --backend {backend} --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-config project_doc_max_bytes=0 --codex-config include_apps_instructions=false --codex-config include_environment_context=false
artifact_paths:
  - fixtures/eval/app/prompt/cautilus-tagline.fixture.json
  - scripts/agent-runtime/run-app-eval.mjs
  - docs/specs/user/evaluation.spec.md
comparison_questions:
  - Does the app/prompt fixture still translate and evaluate through the public eval seam under fixture, live Codex, and live Claude runtimes?
human_review_prompts:
  - id: app-prompt-proof-boundary
    prompt: Where might an operator overread this minimal app/prompt proof beyond fixture translation and one live coding-agent messaging run per supported CLI?
