version: 1
repo: cautilus
evaluation_surfaces:
  - local bundled cautilus skill can launch one bounded claim reviewer lane after review-input preparation
required_prerequisites:
  - materialize the local cautilus skill surface before running the episode fixture
preflight_commands:
  - ./bin/cautilus install --repo-root . --overwrite
  - ./bin/cautilus doctor --repo-root . --scope agent-surface
evaluation_input_default: fixtures/eval/dev/skill/cautilus-reviewer-launch-flow.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-skill-refresh-flow-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --sandbox danger-full-access --timeout-ms 420000 --claim-state absent --artifact-subdir reviewer-launch-flow --reviewer-smoke-backend claude_code --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-config project_doc_max_bytes=0 --codex-config include_apps_instructions=false --codex-config include_environment_context=false --claude-permission-mode dontAsk --claude-allowed-tools 'Bash(*),Write'
artifact_paths:
  - skills/cautilus/SKILL.md
  - fixtures/eval/dev/skill/cautilus-reviewer-launch-flow.fixture.json
  - scripts/run-self-dogfood-skill-refresh-flow-eval.mjs
  - scripts/agent-runtime/run-local-skill-test.mjs
  - scripts/agent-runtime/run-claim-reviewer-smoke.mjs
  - scripts/agent-runtime/audit-cautilus-reviewer-launch-flow-log.mjs
comparison_questions:
  - Can the bundled cautilus skill complete first scan, prepare deterministic review input, launch one actual reviewer lane, and stop before applying results or planning evals under both Codex and Claude CLI runtimes?
human_review_prompts:
  - id: reviewer-launch-flow-episode
    prompt: Where would an operator still conclude that reviewer launch was skipped, unbounded, or overran into apply-result or eval planning?
