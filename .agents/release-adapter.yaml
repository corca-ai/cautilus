version: 1
repo: cautilus
language: en
output_dir: charness-artifacts/release

package_id: cautilus
packaging_manifest_path: package.json
checked_in_plugin_root: plugins/cautilus

sync_command: npm run skills:sync-packaged
quality_command: npm run verify

update_instructions:
  - "Operators with an existing install refresh the binary via the install-sh channel: re-run `curl -fsSL https://raw.githubusercontent.com/corca-ai/cautilus/main/install.sh | sh`. Any legacy Homebrew copy should be removed first with `brew uninstall cautilus`."
  - "Claude Code and Codex plugin consumers pick up the Cautilus Agent refresh via `charness update` or by re-running `cautilus install` in the host repo."

real_host_required_surfaces: []
real_host_required_path_globs: []
real_host_checklist: []

requested_review_commands: []

product_surfaces:
  - installable_cli
  - cautilus_agent
  - bundled_skill

cli_skill_surface_probe_commands:
  - "./bin/cautilus --version"
  - "./bin/cautilus --help"
  - "./bin/cautilus healthcheck --json"
  - "./bin/cautilus commands --json"
  - "./bin/cautilus scenarios --json"

cli_skill_surface_command_docs:
  - docs/cli-reference.md
  - docs/maintainers/operator-acceptance.md

cli_skill_surface_skill_paths:
  - skills/cautilus-agent/SKILL.md
  - plugins/cautilus/skills/cautilus-agent/SKILL.md

cli_skill_surface_change_globs:
  - ".agents/skills/**"
  - "bin/**"
  - "cmd/cautilus/**"
  - "internal/cli/**"
  - "internal/app/**"
  - "docs/cli-reference.md"
  - "docs/maintainers/operator-acceptance.md"
  - "skills/public/**"
  - "skills/cautilus-agent/**"
  - "plugins/**"
  - "plugins/cautilus/**"
  - "install.sh"
  - "scripts/release/**"
