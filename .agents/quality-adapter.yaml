version: 1
repo: cautilus
language: en
output_dir: charness-artifacts/quality
preset_id: portable-defaults
customized_from: portable-defaults
preset_lineage:
  - specdown-quality
  - go-quality
coverage_fragile_margin_pp: 1.0
coverage_floor_policy:
  min_statements_threshold: 30
  fail_below_pct: 80.0
  warn_ceiling_pct: 95.0
  floor_drift_lock_pp: 1.0
  exemption_list_path: scripts/coverage-floor-exemptions.txt
  gate_script_pattern: "*-quality-gate.sh"
  lefthook_path: .githooks/pre-push
  ci_workflow_glob: .github/workflows/*.yml
specdown_smoke_patterns: []
recommendation_defaults_version: issue-64
public_spec_section_exemptions:
  - Fixed Decisions
  - HTTP API contract
  - Server backend stack
  - Deferred Decisions
  - Non-Goals
public_spec_implementation_ref_density_floor: 0.02
public_spec_implementation_guard_min_lines: 100
public_spec_pointer_proof_markers:
  - "proof: pointer"
  - "proof: pointer-spec"
  - "executable_proof: pointer"
  - "public_spec_proof: pointer"
prompt_asset_roots: []
adapter_review_sources: []
acknowledged_recommendations:
  - public_skill_validation_missing_policy
gate_design_review_globs: []
product_surfaces:
  - installable_cli
  - cautilus_agent
cli_skill_surface_probe_commands:
  - ./bin/cautilus --version
  - ./bin/cautilus --help
  - ./bin/cautilus doctor binary --json
  - ./bin/cautilus doctor commands --json
  - ./bin/cautilus discover scenarios --json
  - ./bin/cautilus doctor --repo-root . --scope agent-surface
cli_skill_surface_command_docs:
  - README.md
  - docs/guides/cli.md
  - docs/guides/consumer-adoption.md
  - docs/specs/user/evaluation.spec.md
cli_skill_surface_skill_paths:
  - skills/cautilus-agent/SKILL.md
  - plugins/cautilus/skills/cautilus-agent/SKILL.md
cli_skill_surface_change_globs:
  - bin/**
  - cmd/cautilus/**
  - internal/app/**
  - internal/cli/**
  - internal/runtime/**
  - skills/cautilus-agent/**
  - plugins/cautilus/**
  - docs/guides/cli.md
  - docs/guides/consumer-adoption.md
  - docs/specs/user/evaluation.spec.md
canonical_markdown_surfaces:
  - AGENTS.md
  - CLAUDE.md
prompt_asset_policy:
  source_globs: []
  min_multiline_chars: 400
  exemption_globs: []
skill_ergonomics_gate_rules:
  - progressive_disclosure_risk
skill_ergonomics_skill_paths:
  - skills/cautilus-agent/SKILL.md
  - plugins/cautilus/skills/cautilus-agent/SKILL.md
runtime_profile_default: default
runtime_budgets:
startup_probes:
  - label: cautilus-version
    command:
      - ./bin/cautilus
      - "--version"
    class: standing
    startup_mode: warm
    surface: installable_cli
    samples: 1
  - label: cautilus-healthcheck
    command:
      - ./bin/cautilus
      - healthcheck
      - "--json"
    class: standing
    startup_mode: warm
    surface: installable_cli
    samples: 1
  - label: cautilus-command-registry
    command:
      - ./bin/cautilus
      - commands
      - "--json"
    class: release
    startup_mode: warm
    surface: cli_discovery
    samples: 1
  - label: cautilus-scenario-catalog
    command:
      - ./bin/cautilus
      - scenarios
      - "--json"
    class: release
    startup_mode: warm
    surface: cli_discovery
    samples: 1
  - label: cautilus-agent-surface-install
    command:
      - sh
      - "-c"
      - tmpdir="$(mktemp -d /tmp/cautilus-agent-surface-XXXXXX)" && ./bin/cautilus init --repo-root "$tmpdir" --json >/dev/null && ./bin/cautilus doctor --repo-root "$tmpdir" --scope agent-surface >/dev/null
    class: release
    startup_mode: first-launch
    surface: cautilus_agent
    samples: 1
concept_paths:
  - AGENTS.md
  - README.md
  - docs/guides/cli.md
  - docs/master-plan.md
  - docs/guides/evaluation-process.md
  - docs/maintainers/consumer-readiness.md
  - docs/maintainers/releasing.md
  - docs/specs/old/self-dogfood.spec.md
  - docs/internal/handoff.md
  - skills/cautilus-agent/SKILL.md
  - plugins/cautilus/skills/cautilus-agent/SKILL.md
  - charness-artifacts/quality/quality.md
  - charness-artifacts/quality/latest.md
preflight_commands:
  - ./bin/cautilus doctor adapter --repo-root .
gate_commands:
  - npm run verify
  - npm run dogfood:self
review_commands:
  - npm run lint:skill-disclosure
  - ./bin/cautilus doctor commands --json
  - ./bin/cautilus discover scenarios --json
security_commands:
  - npm run security:govulncheck
  - npm run security:secrets
