version: 1
repo: cautilus
evaluation_surfaces:
  - deterministic self-consumer standing gate for the product repo
  - dev / repo self-dogfood evaluation against the checked-in instruction surface
baseline_options:
  - baseline git ref in the same repo via {baseline_ref}
required_prerequisites:
  - install local dependencies with npm install before running evaluation
  - install the checked-in git hooks with npm run hooks:install before relying on maintainer-local checks
review_timeout_ms: 30000
preflight_commands:
  - npm run hooks:check
evaluation_input_default: fixtures/eval/dev/repo/checked-in-agents-routing.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --fixture-results-file fixtures/eval/dev/repo/internal-runner-fixture-results.json --sandbox read-only --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-home-mode isolated --codex-auth-mode inherit --claude-permission-mode dontAsk
runner_readiness:
  runners:
    - id: dev-repo-self-dogfood
      surfaces:
        - dev/repo
      proof_class: coding-agent-messaging
      command_template: node ./scripts/run-self-dogfood-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --fixture-results-file fixtures/eval/dev/repo/internal-runner-fixture-results.json --sandbox read-only --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --codex-home-mode isolated --codex-auth-mode inherit --claude-permission-mode dontAsk
      assessment_path: .cautilus/runners/dev-repo-self-dogfood.assessment.json
full_gate_command_templates:
  - npm run verify
claim_discovery:
  entries:
    - README.md
    - AGENTS.md
    - CLAUDE.md
  linked_doc_depth: 3
  state_path: .cautilus/claims/latest.json
  related_state_paths:
    - role: reviewed
      path: .cautilus/claims/reviewed-typed-runners.json
    - role: evidenced
      path: .cautilus/claims/evidenced-typed-runners.json
  evidence_roots:
    - .cautilus/claims
  exclude:
    - docs/specs/old/**
    - docs/specs/generated/claim-evidence-state.md
    - docs/claims/**
    - docs/maintainers/**
    - docs/internal/handoff.md
    - docs/internal/research/**
  classification_hints:
    non_claim_section_headings:
      - Rejected Alternatives
      - Alternatives rejected
      - Premortem
  audience_hints:
    user:
      - README.md
      - docs/specs/user/**
      - docs/guides/**
    developer:
      - AGENTS.md
      - docs/specs/contracts/**
      - skills/cautilus-agent/**
      - plugins/cautilus/skills/cautilus-agent/**
      - docs/contracts/**
      - docs/specs/old/**
      - docs/internal/**
      - docs/maintainers/**
      - docs/master-plan.md
      - .agents/**
      - scripts/**
      - internal/**
  semantic_groups:
    - label: Claim discovery and review
      terms:
        - discover claims
        - claim-discovery
        - discover claims review-input
        - review input
        - reviewer
        - action bucket
        - readiness
        - evidence state
        - status report
    - label: Improvement and improvement
      terms:
        - improve
        - gepa
        - improve
        - search
        - frontier
    - label: Adapter and portability
      terms:
        - adapter
        - portable
        - consumer
        - host repo
        - repo-specific
    - label: Quality gates
      terms:
        - test
        - verify
        - lint
        - quality
        - doctor
        - hook
    - label: Agent and skill workflow
      terms:
        - skill
        - agent
        - no-input
        - $cautilus-agent
        - codex
        - claude
    - label: Packets and reporting
      terms:
        - packet
        - report
        - html
        - artifact
        - summary
        - status
    - label: Release and packaging
      terms:
        - release
        - plugin
        - install
        - publish
        - version
    - label: Documentation and contracts
      terms:
        - readme
        - contract
        - spec
        - document
        - guide
    - label: Evaluation surfaces
      terms:
        - dev/repo
        - dev/skill
        - app/chat
        - app/prompt
        - eval
        - scenario
  epic_catalog:
    - epicId: APEX
      branch: APEX
      title: "Cautilus keeps agent/workflow behavior honest across prompt/skill/wrapper change"
      userStory: "As a team whose prompts/skills/models keep changing, I want to pin the behavior that matters and prove it survives every change, so that I can ship changes without silently regressing what I promised."
    - epicId: A1-orchestration
      branch: Agent
      title: "The Cautilus Agent owns workflow routing, sequencing, and guardrails"
      userStory: "As a maintainer, I want the Cautilus Agent to own routing, sequencing, and guardrails, so that I do not hand-orchestrate the eval workflow step by step."
    - epicId: A2-curation-review
      branch: Agent
      title: "The Cautilus Agent curates discovery packets and drives structured review"
      userStory: "As a maintainer, I want the agent to curate raw discovery packets and drive structured review, so that I review a trustworthy claim set instead of high-recall noise."
    - epicId: S1-install
      branch: Setup
      title: "Cautilus installs as a shared machine-level binary plus repo-local agent surface (no scaffold copy)"
      userStory: "As an adopter, I want Cautilus to install as a shared machine-level binary plus a repo-local agent surface, so that I add evaluation without copying another scaffold into my repo."
    - epicId: S2-readiness
      branch: Setup
      title: "doctor/version report setup, onboarding, agent-surface, and wiring readiness"
      userStory: "As an adopter, I want doctor/version to report setup, onboarding, and wiring readiness, so that I know exactly what to fix before a first bounded run."
    - epicId: D1-discovery
      branch: Discover
      title: "Claim discovery turns adapter-owned docs + linked docs into bounded proof-plan candidates (not a verdict)"
      userStory: "As a maintainer, I want discovery to turn my adapter-owned docs into bounded proof-plan candidates (not a verdict), so that I start from source-ref-backed claims rather than a blank page."
    - epicId: D2-review-refresh
      branch: Discover
      title: "Deterministic claim review/refresh: cluster, apply-review, refresh, status, stale-gating, model-spend gating"
      userStory: "As a maintainer, I want deterministic claim review/refresh (cluster, apply-review, refresh, status, stale/model-spend gating), so that my claim set stays current and auditable without surprise model spend."
    - epicId: E1-evaluate
      branch: Eval
      title: "evaluate fixture/observation runs checked-in inputs through adapter-owned runners and evaluates the packet"
      userStory: "As a maintainer, I want evaluate fixture/observation to run checked-in inputs through adapter-owned runners and evaluate the packet, so that I get a durable, comparable verdict surface."
    - epicId: E2-scenarios-experiments
      branch: Eval
      title: "Scenario proposal/attention and skill-experiment compare over preserved baseline/variant outputs"
      userStory: "As a maintainer, I want scenario proposal/attention and skill-experiment compare over preserved baseline/variant outputs, so that I can judge whether a candidate actually got better."
    - epicId: I1-bounded-improvement
      branch: Improve
      title: "Improvement search/revision is bounded by budgets, checkpoints, and blocked-readiness (bounded autonomy)"
      userStory: "As a maintainer, I want improvement search/revision bounded by budgets, checkpoints, and blocked-readiness, so that autonomy stays explicit and never runs away."
    - epicId: M1-proven-on-itself
      branch: Meta/Cross
      title: "Cautilus is proven on itself: specs, dogfood evidence, held-out validation, structured review"
      userStory: "As an evaluator of the product itself, I want Cautilus proven on itself via specs, dogfood evidence, held-out validation, and structured review, so that I can trust the promises before adopting it."
executor_variants:
  - id: codex-root-review
    tool: codex_exec
    purpose: bounded review of whether the root standing gate stays honest
    command_template: CAUTILUS_REVIEW_CODEX_MODEL=gpt-5.4-mini CAUTILUS_REVIEW_CODEX_REASONING_EFFORT=low bash scripts/agent-runtime/run-review-variant.sh --backend codex_exec --workspace {candidate_repo} --prompt-file {prompt_file} --schema-file {schema_file} --output-file {output_file}
    required_prerequisites:
      - generate a current report packet before evaluate review variants
    safety_notes:
      - judge only the current report packet and listed product files
      - do not treat named self-dogfood adapters as proof for the root standing gate
artifact_paths:
  - README.md
  - docs/guides/evaluation-process.md
  - docs/specs/user/index.spec.md
  - docs/specs/generated/claim-evidence-state.md
  - .cautilus/claims/evidenced-typed-runners.json
  - .cautilus/claims/status-summary.json
  - .cautilus/claims/claim-status-report.md
  - .cautilus/claims/evidence-state.json
  - skills/cautilus-agent/SKILL.md
comparison_questions:
  - Does the current deterministic self-consumer gate stay honest about what it actually proves for the product repo?
human_review_prompts:
  - id: operator
    prompt: Where would an operator still conclude that the root standing gate overclaims beyond npm run verify and its listed product artifacts?
default_schema_file: fixtures/review/review-verdict.schema.json
