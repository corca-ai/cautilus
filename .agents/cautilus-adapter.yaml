version: 1
repo: cautilus
evaluation_surfaces:
  - deterministic self-consumer standing gate for the product repo
  - dev / repo self-dogfood evaluation against the checked-in instruction surface
baseline_options:
  - baseline git ref in the same repo via {baseline_ref}
required_prerequisites:
  - install local dependencies with npm install before running evaluation
  - install the checked-in git hooks with npm run hooks:install before relying on maintainer-local checks
review_timeout_ms: 30000
preflight_commands:
  - npm run hooks:check
evaluation_input_default: fixtures/eval/dev/repo/checked-in-agents-routing.fixture.json
eval_test_command_templates:
  - node ./scripts/run-self-dogfood-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --fixture-results-file fixtures/eval/dev/repo/internal-runner-fixture-results.json --sandbox read-only --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --claude-permission-mode dontAsk
runner_readiness:
  runners:
    - id: dev-repo-self-dogfood
      surfaces:
        - dev/repo
      proof_class: coding-agent-messaging
      command_template: node ./scripts/run-self-dogfood-eval.mjs --repo-root . --output-dir {output_dir} --cases-file {eval_cases_file} --output-file {eval_observed_file} --backend {backend} --fixture-results-file fixtures/eval/dev/repo/internal-runner-fixture-results.json --sandbox read-only --timeout-ms 180000 --codex-model gpt-5.4-mini --codex-reasoning-effort low --claude-permission-mode dontAsk
      assessment_path: .cautilus/runners/dev-repo-self-dogfood.assessment.json
full_gate_command_templates:
  - npm run verify
claim_discovery:
  entries:
    - README.md
    - AGENTS.md
    - CLAUDE.md
  linked_markdown_depth: 3
  state_path: .cautilus/claims/latest.json
  related_state_paths:
    - role: reviewed
      path: .cautilus/claims/reviewed-typed-runners.json
    - role: evidenced
      path: .cautilus/claims/evidenced-typed-runners.json
  exclude:
    - docs/internal/handoff.md
    - docs/internal/research/**
  audience_hints:
    user:
      - README.md
      - docs/cli-reference.md
      - docs/guides/**
      - skills/cautilus/**
      - plugins/cautilus/skills/cautilus/**
    developer:
      - AGENTS.md
      - docs/contracts/**
      - docs/specs/**
      - docs/internal/**
      - docs/maintainers/**
      - docs/master-plan.md
      - docs/gepa.md
      - .agents/**
      - scripts/**
      - internal/**
  semantic_groups:
    - label: Claim discovery and review
      terms:
        - claim discover
        - claim-discovery
        - claim review
        - review input
        - reviewer
    - label: Improvement and optimization
      terms:
        - optimize
        - gepa
        - improve
        - search
        - frontier
    - label: Adapter and portability
      terms:
        - adapter
        - portable
        - consumer
        - host repo
        - repo-specific
    - label: Quality gates
      terms:
        - test
        - verify
        - lint
        - quality
        - doctor
        - hook
    - label: Agent and skill workflow
      terms:
        - skill
        - agent
        - no-input
        - $cautilus
        - codex
        - claude
    - label: Packets and reporting
      terms:
        - packet
        - report
        - html
        - artifact
        - summary
        - status
    - label: Release and packaging
      terms:
        - release
        - plugin
        - install
        - publish
        - version
    - label: Documentation and contracts
      terms:
        - readme
        - contract
        - spec
        - document
        - guide
    - label: Evaluation surfaces
      terms:
        - dev/repo
        - dev/skill
        - app/chat
        - app/prompt
        - eval
        - scenario
executor_variants:
  - id: codex-root-review
    tool: codex_exec
    purpose: bounded review of whether the root standing gate stays honest
    command_template: CAUTILUS_REVIEW_CODEX_MODEL=gpt-5.4-mini CAUTILUS_REVIEW_CODEX_REASONING_EFFORT=low bash scripts/agent-runtime/run-review-variant.sh --backend codex_exec --workspace {candidate_repo} --prompt-file {prompt_file} --schema-file {schema_file} --output-file {output_file}
    required_prerequisites:
      - generate a current report packet before review variants
    safety_notes:
      - judge only the current report packet and listed product files
      - do not treat named self-dogfood adapters as proof for the root standing gate
artifact_paths:
  - README.md
  - docs/evaluation-process.md
  - docs/specs/self-dogfood.spec.md
  - skills/cautilus/SKILL.md
comparison_questions:
  - Does the current deterministic self-consumer gate stay honest about what it actually proves for the product repo?
human_review_prompts:
  - id: operator
    prompt: Where would an operator still conclude that the root standing gate overclaims beyond npm run verify and its listed product artifacts?
default_schema_file: fixtures/review/review-verdict.schema.json
